snowflake_query_history_parser:
  type: csv
  description: Snowflake Query History Table
  tags: snowflake,queryhistory
  fields:
    - QUERY_ID
    - QUERY_TEXT
    - DATABASE_ID
    - DATABASE_NAME
    - SCHEMA_ID
    - SCHEMA_NAME
    - QUERY_TYPE
    - SESSION_ID
    - USER_NAME
    - ROLE_NAME
    - WAREHOUSE_ID
    - WAREHOUSE_NAME
    - WAREHOUSE_SIZE
    - WAREHOUSE_TYPE
    - CLUSTER_NUMBER
    - QUERY_TAG
    - EXECUTION_STATUS
    - ERROR_CODE
    - ERROR_MESSAGE
    - START_TIME
    - END_TIME
    - TOTAL_ELAPSED_TIME
    - BYTES_SCANNED
    - PERCENTAGE_SCANNED_FROM_CACHE
    - BYTES_WRITTEN
    - BYTES_WRITTEN_TO_RESULT
    - BYTES_READ_FROM_RESULT
    - ROWS_PRODUCED
    - ROWS_INSERTED
    - ROWS_UPDATED
    - ROWS_DELETED
    - ROWS_UNLOADED
    - BYTES_DELETED
    - PARTITIONS_SCANNED
    - PARTITIONS_TOTAL
    - BYTES_SPILLED_TO_LOCAL_STORAGE
    - BYTES_SPILLED_TO_REMOTE_STORAGE
    - BYTES_SENT_OVER_THE_NETWORK
    - COMPILATION_TIME
    - EXECUTION_TIME
    - QUEUED_PROVISIONING_TIME
    - QUEUED_REPAIR_TIME
    - QUEUED_OVERLOAD_TIME
    - TRANSACTION_BLOCKED_TIME
    - OUTBOUND_DATA_TRANSFER_CLOUD
    - OUTBOUND_DATA_TRANSFER_REGION
    - OUTBOUND_DATA_TRANSFER_BYTES
    - INBOUND_DATA_TRANSFER_CLOUD
    - INBOUND_DATA_TRANSFER_REGION
    - INBOUND_DATA_TRANSFER_BYTES
    - LIST_EXTERNAL_FILES_TIME
    - CREDITS_USED_CLOUD_SERVICES
    - RELEASE_VERSION
    - EXTERNAL_FUNCTION_TOTAL_INVOCATIONS
    - EXTERNAL_FUNCTION_TOTAL_SENT_ROWS
    - EXTERNAL_FUNCTION_TOTAL_RECEIVED_ROWS
    - EXTERNAL_FUNCTION_TOTAL_SENT_BYTES
    - EXTERNAL_FUNCTION_TOTAL_RECEIVED_BYTES
    - QUERY_LOAD_PERCENT
    - IS_CLIENT_GENERATED_STATEMENT
    - QUERY_ACCELERATION_BYTES_SCANNED
    - QUERY_ACCELERATION_PARTITIONS_SCANNED
    - QUERY_ACCELERATION_UPPER_LIMIT_SCALE_FACTOR
    - TRANSACTION_ID
    - CHILD_QUERIES_WAIT_TIME
    - ROLE_TYPE
    - QUERY_HASH
    - QUERY_HASH_VERSION
    - QUERY_PARAMETERIZED_HASH
    - QUERY_PARAMETERIZED_HASH_VERSION
    - SECONDARY_ROLE_STATS
    - ROWS_WRITTEN_TO_RESULT
    - QUERY_RETRY_TIME
    - QUERY_RETRY_CAUSE
    - FAULT_HANDLING_TIME
    - USER_TYPE
    - USER_DATABASE_NAME
    - USER_DATABASE_ID
    - USER_SCHEMA_NAME
    - USER_SCHEMA_ID
  lib: custom
snowflake_login_history_parser:
  type: csv
  description: Snowflake Login History Query
  tags: snowflake,sql,api,logins
  fields:
    - EVENT_ID
    - EVENT_TIMESTAMP
    - EVENT_TYPE
    - USER_NAME
    - CLIENT_IP
    - REPORTED_CLIENT_TYPE
    - REPORTED_CLIENT_VERSION
    - FIRST_AUTHENTICATION_FACTOR
    - SECOND_AUTHENTICATION_FACTOR
    - IS_SUCCESS
    - ERROR_CODE
    - ERROR_MESSAGE
    - RELATED_EVENT_ID
    - CONNECTION
    - CLIENT_PRIVATE_LINK_ID
  lib: custom
snowflake_access_history_parser:
  type: csv
  lib: custom
  description: Snowflake Access History Table
  tags: snowflake,access
  fields:
    - QUERY_ID
    - QUERY_START_TIME
    - DIRECT_OBJECTS_ACCESSED
    - BASE_OBJECTS_ACCESSED
    - OBJECTS_MODIFIED
    - OBJECT_MODIFIED_BY_DDL
    - POLICIES_REFERENCED
    - PARENT_QUERY_ID
    - EVENT_SOURCE
    - USER_NAME
    - ADDITIONAL_PROPERTIES
    - ROOT_QUERY_ID
snowflake_session_history_parser:
  type: csv
  lib: custom
  description: Snowflake Session History Table
  tags: snowflake,sessions
  fields:
    - SESSION_ID
    - CREATED_ON
    - USER_NAME
    - AUTHENTICATION_METHOD
    - LOGIN_EVENT_ID
    - CLIENT_APPLICATION_VERSION
    - CLIENT_APPLICATION_ID
    - CLIENT_ENVIRONMENT
    - CLIENT_BUILD_ID
    - CLIENT_VERSION
    - CLOSED_REASON
    - IS_OPEN
    - ACCESS_TIME
