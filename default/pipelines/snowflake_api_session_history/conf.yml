output: default
streamtags:
  - snowflake
  - api
  - sql
groups: {}
asyncFuncTimeout: 1000
functions:
  - id: comment
    filter: "true"
    conf:
      comment: "This step takes the initial payload in JSON format and parses it into
        KV Pairs based on the parser. It also removes all null and values = 0. "
  - id: drop
    filter: _raw.search(/resultSetMetaData/i)>=0
    disabled: false
    conf: {}
    description: Drops first line with all the metadata
  - id: comment
    filter: "true"
    conf:
      comment: This step drops the initial metadata results. You an disable this step
        if you want to return the JSON metadata event.
  - id: serde
    filter: "true"
    conf:
      mode: extract
      type: csv
      srcField: _raw
      delimChar: ","
      quoteChar: '"'
      escapeChar: \
      nullValue: "-"
      fields:
        - SESSION_ID
        - CREATED_ON
        - USER_NAME
        - AUTHENTICATION_METHOD
        - LOGIN_EVENT_ID
        - CLIENT_APPLICATION_VERSION
        - CLIENT_APPLICATION_ID
        - CLIENT_ENVIRONMENT
        - CLIENT_BUILD_ID
        - CLIENT_VERSION
        - CLOSED_REASON
        - IS_OPEN
        - ACCESS_TIME
      remove: []
      fieldFilterExpr: value !== 'null' && value !== 'null]' && value !== '0'
    description: Parses out the Query History and removes all null and 0 values
  - id: comment
    filter: "true"
    conf:
      comment: Drop the _raw field since it is redundant with all the events in KV
        Pairs.
  - id: eval
    filter: "true"
    disabled: false
    conf:
      printUndefineds: false
      remove:
        - _raw
    description: Drop the _raw events while keeping the KV Pair events
    final: true
description: Snowflake SQL API Pull
