output: default
streamtags:
  - snowflake
  - api
  - sql
groups: {}
asyncFuncTimeout: 1000
functions:
  - id: comment
    filter: "true"
    conf:
      comment: "This step takes the initial payload in JSON format and parses it into
        KV Pairs based on the parser. It also removes all null and values = 0. "
  - id: serde
    filter: "true"
    disabled: false
    conf:
      mode: extract
      type: csv
      srcField: _raw
      delimChar: ","
      quoteChar: '"'
      escapeChar: \
      nullValue: "-"
      fields:
        - EVENT_ID
        - EVENT_TIMESTAMP
        - EVENT_TYPE
        - USER_NAME
        - CLIENT_IP
        - REPORTED_CLIENT_TYPE
        - REPORTED_CLIENT_VERSION
        - FIRST_AUTHENTICATION_FACTOR
        - SECOND_AUTHENTICATION_FACTOR
        - IS_SUCCESS
        - ERROR_CODE
        - ERROR_MESSAGE
        - RELATED_EVENT_ID
        - CONNECTION
        - CLIENT_PRIVATE_LINK_ID
      remove: []
      fieldFilterExpr: value !== 'null' && value !== 'null]' && value !== '0'
    description: Parses out the Login History and removes all null and 0 values
  - id: comment
    filter: "true"
    conf:
      comment: This step drops the initial metadata results. You an disable this step
        if you want to return the JSON metadata event.
  - id: drop
    filter: _raw.search(/resultSetMetaData/i)>=0
    disabled: false
    conf: {}
    description: Drops first line with all the metadata
  - id: comment
    filter: "true"
    conf:
      comment: This step removes the orphaned closed bracket at the end of the event
        stream.
  - id: drop
    filter: _raw.search(/}/i)>=0
    disabled: false
    conf: {}
    description: Drops line with orphaned closed bracket
  - id: comment
    filter: "true"
    conf:
      comment: Drop the _raw field since it is redundant with all the events in KV
        Pairs.
  - id: eval
    filter: "true"
    conf:
      printUndefineds: false
      remove:
        - _raw
description: Snowflake SQL API Pull
