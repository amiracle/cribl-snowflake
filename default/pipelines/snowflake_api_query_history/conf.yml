output: default
streamtags:
  - snowflake
  - api
  - sql
groups: {}
asyncFuncTimeout: 1000
functions:
  - id: comment
    filter: "true"
    conf:
      comment: "This step takes the initial payload in JSON format and parses it into
        KV Pairs based on the parser. It also removes all null and values = 0. "
  - id: drop
    filter: _raw.search(/resultSetMetaData/i)>=0
    conf: {}
    description: Drops first line with all the metadata
  - id: comment
    filter: "true"
    conf:
      comment: This step drops the initial metadata results. You an disable this step
        if you want to return the JSON metadata event.
  - id: serde
    filter: "true"
    conf:
      mode: extract
      type: csv
      srcField: _raw
      delimChar: ","
      quoteChar: '"'
      escapeChar: \
      nullValue: "-"
      fields:
        - QUERY_ID
        - QUERY_TEXT
        - DATABASE_ID
        - DATABASE_NAME
        - SCHEMA_ID
        - SCHEMA_NAME
        - QUERY_TYPE
        - SESSION_ID
        - USER_NAME
        - ROLE_NAME
        - WAREHOUSE_ID
        - WAREHOUSE_NAME
        - WAREHOUSE_SIZE
        - WAREHOUSE_TYPE
        - CLUSTER_NUMBER
        - QUERY_TAG
        - EXECUTION_STATUS
        - ERROR_CODE
        - ERROR_MESSAGE
        - START_TIME
        - END_TIME
        - TOTAL_ELAPSED_TIME
        - BYTES_SCANNED
        - PERCENTAGE_SCANNED_FROM_CACHE
        - BYTES_WRITTEN
        - BYTES_WRITTEN_TO_RESULT
        - BYTES_READ_FROM_RESULT
        - ROWS_PRODUCED
        - ROWS_INSERTED
        - ROWS_UPDATED
        - ROWS_DELETED
        - ROWS_UNLOADED
        - BYTES_DELETED
        - PARTITIONS_SCANNED
        - PARTITIONS_TOTAL
        - BYTES_SPILLED_TO_LOCAL_STORAGE
        - BYTES_SPILLED_TO_REMOTE_STORAGE
        - BYTES_SENT_OVER_THE_NETWORK
        - COMPILATION_TIME
        - EXECUTION_TIME
        - QUEUED_PROVISIONING_TIME
        - QUEUED_REPAIR_TIME
        - QUEUED_OVERLOAD_TIME
        - TRANSACTION_BLOCKED_TIME
        - OUTBOUND_DATA_TRANSFER_CLOUD
        - OUTBOUND_DATA_TRANSFER_REGION
        - OUTBOUND_DATA_TRANSFER_BYTES
        - INBOUND_DATA_TRANSFER_CLOUD
        - INBOUND_DATA_TRANSFER_REGION
        - INBOUND_DATA_TRANSFER_BYTES
        - LIST_EXTERNAL_FILES_TIME
        - CREDITS_USED_CLOUD_SERVICES
        - RELEASE_VERSION
        - EXTERNAL_FUNCTION_TOTAL_INVOCATIONS
        - EXTERNAL_FUNCTION_TOTAL_SENT_ROWS
        - EXTERNAL_FUNCTION_TOTAL_RECEIVED_ROWS
        - EXTERNAL_FUNCTION_TOTAL_SENT_BYTES
        - EXTERNAL_FUNCTION_TOTAL_RECEIVED_BYTES
        - QUERY_LOAD_PERCENT
        - IS_CLIENT_GENERATED_STATEMENT
        - QUERY_ACCELERATION_BYTES_SCANNED
        - QUERY_ACCELERATION_PARTITIONS_SCANNED
        - QUERY_ACCELERATION_UPPER_LIMIT_SCALE_FACTOR
        - TRANSACTION_ID
        - CHILD_QUERIES_WAIT_TIME
        - ROLE_TYPE
        - QUERY_HASH
        - QUERY_HASH_VERSION
        - QUERY_PARAMETERIZED_HASH
        - QUERY_PARAMETERIZED_HASH_VERSION
        - SECONDARY_ROLE_STATS
        - ROWS_WRITTEN_TO_RESULT
        - QUERY_RETRY_TIME
        - QUERY_RETRY_CAUSE
        - FAULT_HANDLING_TIME
        - USER_TYPE
        - USER_DATABASE_NAME
        - USER_DATABASE_ID
        - USER_SCHEMA_NAME
        - USER_SCHEMA_ID
      remove: []
      fieldFilterExpr: value !== 'null' && value !== 'null]' && value !== '0'
    description: Parses out the Query History and removes all null and 0 values
  - id: comment
    filter: "true"
    conf:
      comment: This step removes the orphaned closed bracket at the end of the event
        stream.
  - id: drop
    filter: _raw.search(/}/i)>=0
    conf: {}
    description: Drops event with orphaned bracket
  - id: comment
    filter: "true"
    conf:
      comment: Drop the _raw field since it is redundant with all the events in KV
        Pairs.
  - id: eval
    filter: "true"
    conf:
      printUndefineds: false
      remove:
        - _raw
description: Snowflake Query History - parse nested JSON fields
