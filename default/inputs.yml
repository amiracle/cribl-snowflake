in_snowflake_login_history:
  type: collection
  disabled: true
  sendToRoutes: true
  preprocess:
    disabled: true
  throttleRatePerSec: "0"
  breakerRulesets:
    - Snowflake API Ruleset
  metadata:
    - name: __packsource
      value: "'cribl-snowflake-rest-io.snowflake-login-history'"
    - name: sourcetype
      value: "'snowflake:login'"
    - name: index
      value: C.vars['default_splunk_index']
